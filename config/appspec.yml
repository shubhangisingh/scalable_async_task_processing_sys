version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu/scalable_async_task_processing_sys

hooks:
  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: ubuntu

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300
      runas: ubuntu